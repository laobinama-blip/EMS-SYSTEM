openapi: 3.1.0
info:
  title: EMS (Energy Management System) KPI 看板接口规范
  version: 1.1.0
  description: |
    本规范定义 EMS KPI 看板前端需要调用的接口契约。
    首版允许采用“前端优先 / 前端-only”模式：如果真实后端接口已可访问，前端直接按本契约调用接口，不强制开发本仓库后端。
    当前官方文档仅覆盖能源与碳排相关 10 个接口；作业效率、关系网、调度分析、分时电价和调度前后对比字段属于 EMS 看板 mock/扩展契约。
servers:
  - url: http://10.105.64.36:20003/api
    description: 官方能源与碳排服务地址
  - url: http://localhost:5173/api
    description: 前端开发代理地址，代理到真实后端或本地 mock adapter

tags:
  - name: Common
  - name: Efficiency
  - name: Network
  - name: Dispatch
  - name: Energy

paths:
  /kpi/common/header-status:
    get:
      summary: 顶栏状态与告警信息（EMS 扩展）
      tags: [Common]
      responses:
        '200':
          description: 顶栏状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeHeaderStatus'

  /kpi/efficiency/work-summary:
    get:
      summary: 作业效率页作业量汇总（EMS 扩展）
      tags: [Efficiency]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 作业量汇总，包含原型中的全部、装船、卸船、转堆、未知任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeWorkSummary'

  /kpi/efficiency/summary-cards:
    get:
      summary: 作业效率页能耗、效率、设备汇总（EMS 扩展）
      tags: [Efficiency]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 支撑原型中的能耗、效率、设备三大统计块
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeEfficiencySummaryCards'

  /kpi/efficiency/charts:
    get:
      summary: 作业效率页调度前后对比图表（EMS 扩展）
      tags: [Efficiency]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 车辆平均效率、空驶率、岸桥效率、场桥效率、车辆平均等待时间
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeEfficiencyCharts'

  /kpi/network/topology:
    get:
      summary: 关系网拓扑图节点与连线（EMS 扩展）
      tags: [Network]
      parameters:
        - $ref: '#/components/parameters/startTimeOptional'
        - $ref: '#/components/parameters/endTimeOptional'
      responses:
        '200':
          description: 拓扑节点、连线和状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeTopology'

  /kpi/dispatch/algorithm-efficiency:
    get:
      summary: 调度算法效率提升曲线（EMS 扩展）
      tags: [Dispatch]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 算法效率提升对比曲线和统计卡
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeAlgorithmEfficiency'

  /kpi/dispatch/hymala-stability:
    get:
      summary: Hymala 世界模型稳定性（EMS 扩展）
      tags: [Dispatch]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 成功率、响应时延、调用数、超时率和响应曲线
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeHymalaStability'

  /kpi/dispatch/secondary-events:
    get:
      summary: 二次调度事件时间轴（EMS 扩展）
      tags: [Dispatch]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 横向时间轴事件块
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSecondaryEvents'

  /kpi/energy/device-types:
    get:
      summary: 设备类型下拉（官方接口）
      tags: [Energy]
      responses:
        '200':
          description: 固定设备类型枚举
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeDeviceTypes'

  /kpi/energy/devices:
    get:
      summary: 设备编码下拉（官方接口）
      tags: [Energy]
      parameters:
        - name: deviceTypeCode
          in: query
          required: false
          schema:
            type: string
            enum: [VEHICLE, QC, YC]
      responses:
        '200':
          description: 设备编码列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeDevices'

  /kpi/energy/single-box-energy-statistics:
    get:
      summary: 单箱能耗结构（官方接口）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: QC、水平运输、YC、外集卡的单箱能耗结构；官方文档中 externalTruck 当前固定为空数组
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSingleBoxEnergy'

  /kpi/energy/single-box-energy-cost:
    get:
      summary: 单箱综合成本结构（官方接口）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 单箱成本结构
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeSingleBoxCost'

  /kpi/energy/carbon-emission-distribution:
    get:
      summary: 单箱碳排结构（官方接口）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 单箱碳排结构
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeCarbonDistribution'

  /kpi/energy/energy-trend:
    get:
      summary: 总能耗趋势（官方接口 + EMS 扩展字段）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
        - name: timeGranularity
          in: query
          required: false
          schema:
            type: string
            enum: [day, hour]
        - name: deviceCode
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 官方字段为 totalEnergyConsumption/averageEnergyConsumption；调度前后字段为 EMS 扩展
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeEnergyTrend'

  /kpi/energy/energy-ranking:
    get:
      summary: 设备能耗排名（官方接口）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
        - name: deviceCode
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 设备能耗排名
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeEnergyRanking'

  /kpi/energy/device-energy-ratio:
    post:
      summary: 设备能耗类型占比（官方接口）
      tags: [Energy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startTime, endTime, deviceTypeCodeList]
              properties:
                startTime:
                  $ref: '#/components/schemas/LocalDateTimeString'
                endTime:
                  $ref: '#/components/schemas/LocalDateTimeString'
                deviceTypeCodeList:
                  type: array
                  items:
                    type: string
                    enum: [VEHICLE, QC, YC]
      responses:
        '200':
          description: 设备类型能耗占比
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeDeviceEnergyRatio'

  /kpi/energy/traditional-vs-green-power:
    get:
      summary: 传统能源与绿能趋势（官方接口）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
        - name: timeGranularity
          in: query
          required: false
          schema:
            type: string
            enum: [day, hour]
      responses:
        '200':
          description: 传统能源与绿能趋势
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeTraditionalVsGreen'

  /kpi/energy/time-of-use-electricity:
    get:
      summary: 分时电价避峰能耗与成本矩阵（EMS 扩展）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
      responses:
        '200':
          description: 分时电价统计，时段按原型口径：00:00-02:00、02:00-08:00、08:00-12:00、12:00-18:00、18:00-22:00、22:00-24:00
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeTimeOfUseElectricity'

  /kpi/energy/vehicle-energy-per-100km:
    get:
      summary: 单车百公里能耗（官方接口 + EMS 扩展字段）
      tags: [Energy]
      parameters:
        - $ref: '#/components/parameters/startTime'
        - $ref: '#/components/parameters/endTime'
        - name: deviceCode
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 官方字段为 energyPer100km/cost/carbonEmission；调度前后对比为 EMS 扩展
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiEnvelopeVehicleEnergyPer100km'

components:
  parameters:
    startTime:
      name: startTime
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/LocalDateTimeString'
      example: '2026-05-21 00:00:00'
    endTime:
      name: endTime
      in: query
      required: true
      schema:
        $ref: '#/components/schemas/LocalDateTimeString'
      example: '2026-05-21 23:59:59'
    startTimeOptional:
      name: startTime
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/LocalDateTimeString'
    endTimeOptional:
      name: endTime
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/LocalDateTimeString'

  schemas:
    LocalDateTimeString:
      type: string
      description: 本地时间字符串，格式为 yyyy-MM-dd HH:mm:ss；不强制 ISO 8601。
      pattern: '^\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}$'
      example: '2026-05-21 00:00:00'

    ApiEnvelope:
      type: object
      description: Mock/扩展接口推荐使用 envelope；前端 apiClient 必须兼容真实后端直接返回 data body 的情况。
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok

    MetricItem:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string
        unit:
          type: string
        trend:
          type: string
          enum: [up, down, flat]

    CompareTimePoint:
      type: object
      required: [statTime, beforeDispatchValue, afterDispatchValue]
      properties:
        statTime:
          $ref: '#/components/schemas/LocalDateTimeString'
        beforeDispatchValue:
          type: number
        afterDispatchValue:
          type: number

    EfficiencySummaryGroup:
      type: object
      properties:
        title:
          type: string
          example: 装船作业统计
        teu:
          type: number
        naturalBoxes:
          type: integer
        cycles:
          type: integer
        box20:
          type: integer
        box40:
          type: integer
        box45:
          type: integer

    ApiEnvelopeWorkSummary:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                total:
                  $ref: '#/components/schemas/EfficiencySummaryGroup'
                loading:
                  $ref: '#/components/schemas/EfficiencySummaryGroup'
                unloading:
                  $ref: '#/components/schemas/EfficiencySummaryGroup'
                transfer:
                  $ref: '#/components/schemas/EfficiencySummaryGroup'
                unknown:
                  $ref: '#/components/schemas/EfficiencySummaryGroup'

    ApiEnvelopeEfficiencySummaryCards:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                energy:
                  type: array
                  description: 原型中的能耗指标块，例如总能源投入金额、调度节能成本、燃油总消耗、碳排等。
                  items:
                    $ref: '#/components/schemas/MetricItem'
                efficiency:
                  type: array
                  description: 原型中的效率指标块，例如全场平均效率、岸桥平均效率、场桥平均效率、泊位效率等。
                  items:
                    $ref: '#/components/schemas/MetricItem'
                equipment:
                  type: object
                  properties:
                    all:
                      type: array
                      items:
                        $ref: '#/components/schemas/MetricItem'
                    singleVehicle:
                      type: array
                      items:
                        $ref: '#/components/schemas/MetricItem'
                    averageEfficiency:
                      type: array
                      items:
                        $ref: '#/components/schemas/MetricItem'

    ApiEnvelopeEfficiencyCharts:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                vehicleAverageEfficiency:
                  type: array
                  items:
                    $ref: '#/components/schemas/CompareTimePoint'
                vehicleEmptyRate:
                  type: array
                  items:
                    $ref: '#/components/schemas/CompareTimePoint'
                berthEfficiency:
                  type: array
                  items:
                    $ref: '#/components/schemas/CompareTimePoint'
                yardBridgeEfficiency:
                  type: array
                  items:
                    $ref: '#/components/schemas/CompareTimePoint'
                vehicleAverageWaitTime:
                  type: array
                  items:
                    $ref: '#/components/schemas/CompareTimePoint'

    NetworkNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [QC, YC, RTG, VEHICLE, BLOCK, SHIP, CHARGING_STATION, SWAPPING_STATION]
        status:
          type: string
          enum: [ACTIVE, IDLE, ERROR, CHARGING]
        x:
          type: number
          description: 画布百分比坐标 x，用于高保真复刻原型布局
        y:
          type: number
          description: 画布百分比坐标 y，用于高保真复刻原型布局
        battery:
          type: integer
        activeAssignment:
          type: string

    NetworkEdge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        type:
          type: string
        status:
          type: string

    ApiEnvelopeTopology:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    $ref: '#/components/schemas/NetworkNode'
                edges:
                  type: array
                  items:
                    $ref: '#/components/schemas/NetworkEdge'

    ApiEnvelopeAlgorithmEfficiency:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                series:
                  type: array
                  items:
                    type: object
                    properties:
                      statTime:
                        $ref: '#/components/schemas/LocalDateTimeString'
                      baselineEfficiency:
                        type: number
                      optimizedEfficiency:
                        type: number
                cards:
                  type: array
                  items:
                    $ref: '#/components/schemas/MetricItem'

    ApiEnvelopeHymalaStability:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                series:
                  type: array
                  items:
                    type: object
                    properties:
                      statTime:
                        $ref: '#/components/schemas/LocalDateTimeString'
                      latencyMs:
                        type: number
                cards:
                  type: array
                  items:
                    $ref: '#/components/schemas/MetricItem'

    ApiEnvelopeSecondaryEvents:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                triggeredCount:
                  type: integer
                events:
                  type: array
                  items:
                    type: object
                    properties:
                      eventId:
                        type: string
                      eventName:
                        type: string
                      startTime:
                        $ref: '#/components/schemas/LocalDateTimeString'
                      durationSeconds:
                        type: integer
                      tone:
                        type: string
                        enum: [green, blue, indigo, orange, red, yellow]
                      description:
                        type: string

    DeviceType:
      type: object
      properties:
        code:
          type: string
          enum: [VEHICLE, QC, YC]
        name:
          type: string

    Device:
      type: object
      properties:
        deviceCode:
          type: string
        deviceName:
          type: string

    ApiEnvelopeDeviceTypes:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DeviceType'

    ApiEnvelopeDevices:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Device'

    EnergyDetailItem:
      type: object
      properties:
        energyType:
          type: string
          example: 绿电
        energyValue:
          type: number
        energyUnit:
          type: string
          example: kWh

    CostDetailItem:
      allOf:
        - $ref: '#/components/schemas/EnergyDetailItem'
        - type: object
          properties:
            unitPrice:
              type: number
            energyAmount:
              type: number

    CarbonDetailItem:
      allOf:
        - $ref: '#/components/schemas/EnergyDetailItem'
        - type: object
          properties:
            carbonFactor:
              type: number
            carbonEmission:
              type: number

    SingleBoxEnergyData:
      type: object
      properties:
        qc:
          type: array
          items:
            $ref: '#/components/schemas/EnergyDetailItem'
        horizontalTransport:
          type: array
          items:
            $ref: '#/components/schemas/EnergyDetailItem'
        yc:
          type: array
          items:
            $ref: '#/components/schemas/EnergyDetailItem'
        externalTruck:
          type: array
          description: 官方接口当前固定为空数组；前端如展示原型外集卡值，应标注为 mock 展示数据。
          items:
            $ref: '#/components/schemas/EnergyDetailItem'

    ApiEnvelopeSingleBoxEnergy:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SingleBoxEnergyData'

    ApiEnvelopeSingleBoxCost:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                qc:
                  type: array
                  items:
                    $ref: '#/components/schemas/CostDetailItem'
                horizontalTransport:
                  type: array
                  items:
                    $ref: '#/components/schemas/CostDetailItem'
                yc:
                  type: array
                  items:
                    $ref: '#/components/schemas/CostDetailItem'
                externalTruck:
                  type: array
                  items:
                    $ref: '#/components/schemas/CostDetailItem'

    ApiEnvelopeCarbonDistribution:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                qc:
                  type: array
                  items:
                    $ref: '#/components/schemas/CarbonDetailItem'
                horizontalTransport:
                  type: array
                  items:
                    $ref: '#/components/schemas/CarbonDetailItem'
                yc:
                  type: array
                  items:
                    $ref: '#/components/schemas/CarbonDetailItem'
                externalTruck:
                  type: array
                  items:
                    $ref: '#/components/schemas/CarbonDetailItem'

    ApiEnvelopeEnergyTrend:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  statTime:
                    $ref: '#/components/schemas/LocalDateTimeString'
                  totalEnergyConsumption:
                    type: number
                  averageEnergyConsumption:
                    type: number
                  beforeDispatchEnergy:
                    type: number
                    description: EMS 看板扩展字段，官方文档未定义。
                  afterDispatchEnergy:
                    type: number
                    description: EMS 看板扩展字段，官方文档未定义。

    ApiEnvelopeEnergyRanking:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  deviceCode:
                    type: string
                  totalEnergyConsumption:
                    type: number
                  averageUsageDuration:
                    type: number
                  greenEnergyRate:
                    type: number

    ApiEnvelopeDeviceEnergyRatio:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  deviceType:
                    type: string
                  deviceEnergyRate:
                    type: number
                  deviceEnergyDetails:
                    type: array
                    items:
                      type: object
                      properties:
                        deviceCode:
                          type: string
                        energyType:
                          type: string
                        energyConsumption:
                          type: number

    ApiEnvelopeTraditionalVsGreen:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  statTime:
                    $ref: '#/components/schemas/LocalDateTimeString'
                  traditionalPower:
                    type: number
                  greenPower:
                    type: number

    ApiEnvelopeTimeOfUseElectricity:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                kpis:
                  type: object
                  properties:
                    beforeDispatchCost:
                      type: number
                    afterDispatchCost:
                      type: number
                    savingsAmount:
                      type: number
                    averagePricePer100km:
                      type: number
                    peakShiftingRate:
                      type: number
